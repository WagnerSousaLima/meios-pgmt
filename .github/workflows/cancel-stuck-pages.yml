name: Cancel stuck Pages deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  contents: read

jobs:
  cancel:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel stuck deployment
        run: |
          curl -L --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/WagnerSousaLima/meios-pgmt/pages/deployments/ddbd8dca9ab0ae81ff4de4f8290888ff5680847a/cancel"
